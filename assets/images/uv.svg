<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="uvFill" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </radialGradient>
  </defs>

  <g stroke="#A855F7" stroke-linecap="round">
    <g stroke-width="3">
      <line x1="47.00" y1="32.00" x2="53.00" y2="32.00"/>
      <line x1="39.50" y1="19.01" x2="42.50" y2="13.81"/>
      <line x1="24.50" y1="19.01" x2="21.50" y2="13.81"/>
      <line x1="17.00" y1="32.00" x2="11.00" y2="32.00"/>
      <line x1="24.50" y1="44.99" x2="21.50" y2="50.19"/>
      <line x1="39.50" y1="44.99" x2="42.50" y2="50.19"/>
    </g>
    <g stroke-width="2.4">
      <line x1="44.99" y1="24.50" x2="48.45" y2="22.50"/>
      <line x1="32.00" y1="17.00" x2="32.00" y2="13.00"/>
      <line x1="19.01" y1="24.50" x2="15.55" y2="22.50"/>
      <line x1="19.01" y1="39.50" x2="15.55" y2="41.50"/>
      <line x1="32.00" y1="47.00" x2="32.00" y2="51.00"/>
      <line x1="44.99" y1="39.50" x2="48.45" y2="41.50"/>
    </g>
  </g>

  <!-- badge is self-contained: its own fill gives the label contrast,
       independent of whatever card background sits behind it -->
  <circle cx="32" cy="32" r="12.5" fill="url(#uvFill)" stroke="#6D28D9" stroke-width="1.2"/>
  <text x="32" y="36.5" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-weight="700" font-size="11" fill="#F5F0FF" letter-spacing="0.5">UV</text>
</svg>
