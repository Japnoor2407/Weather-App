<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- AQI gauge icon: transparent background, works on dark or light cards -->
  <g fill="none" stroke-linecap="round">
    <path d="M 11.00 38.00 A 21 21 0 0 0 16.77 23.54" stroke="#4ADE80" stroke-width="7"/>
    <path d="M 17.54 22.77 A 21 21 0 0 0 31.45 17.01" stroke="#FACC15" stroke-width="7"/>
    <path d="M 32.55 17.01 A 21 21 0 0 0 46.46 22.77" stroke="#FB923C" stroke-width="7"/>
    <path d="M 47.23 23.54 A 21 21 0 0 0 53.00 38.00" stroke="#F16A6A" stroke-width="7"/>
  </g>

  <!-- needle: light fill + soft dark outline so it reads on both dark and light cards -->
  <polygon points="29.05,38.52 34.95,37.48 29.22,22.24"
           fill="#F4F7FF" stroke="rgba(15,20,40,0.45)" stroke-width="1.1" stroke-linejoin="round"/>
  <circle cx="32" cy="38" r="4.5" fill="#F4F7FF" stroke="rgba(15,20,40,0.45)" stroke-width="1.1"/>
  <circle cx="32" cy="38" r="1.8" fill="#4C63D2"/>
</svg>
